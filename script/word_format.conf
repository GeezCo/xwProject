# ============================================================================
# Word 文档格式配置文件
# ============================================================================
#
# 样式来源：甲方规格模板 [非密]附录J 软件需求规格说明（SRS）
# 严格按照甲方模板样式配置
#
# ============================================================================

# ----------------------------------------------------------------------------
# 正文样式配置（样式名：正文_文）
# ----------------------------------------------------------------------------
# 正文字体 - 甲方模板使用宋体
BODY_FONT=宋体

# 正文字体备选
BODY_FONT_FALLBACK=仿宋

# 正文字号 - 甲方模板使用12磅（小四号）
BODY_FONT_SIZE=12

# 正文行距 - 甲方模板使用21磅
BODY_LINE_SPACING=21

# 正文首行缩进 - 甲方模板正文无首行缩进
BODY_FIRST_LINE_INDENT=0

# ----------------------------------------------------------------------------
# 一级标题样式配置（样式名：Heading 1）
# ----------------------------------------------------------------------------
TITLE1_FONT=黑体
TITLE1_FONT_SIZE=12
TITLE1_LINE_SPACING=21
TITLE1_BOLD=true
TITLE1_FIRST_LINE_INDENT=0

# ----------------------------------------------------------------------------
# 二级标题样式配置（样式名：Heading 2）
# 注意：甲方模板二级标题有悬挂缩进（左缩进+首行负缩进）
# ----------------------------------------------------------------------------
TITLE2_FONT=黑体
TITLE2_FONT_SIZE=12
TITLE2_LINE_SPACING=21
TITLE2_BOLD=true
# 二级标题左缩进（磅值）- 甲方模板32.4磅
TITLE2_LEFT_INDENT=32.4
# 二级标题首行缩进（磅值，负值表示悬挂缩进）- 甲方模板-32.4磅
TITLE2_FIRST_LINE_INDENT=-32.4

# ----------------------------------------------------------------------------
# 三级标题样式配置
# ----------------------------------------------------------------------------
TITLE3_FONT=黑体
TITLE3_FONT_SIZE=12
TITLE3_LINE_SPACING=21
TITLE3_BOLD=true
TITLE3_LEFT_INDENT=64.8
TITLE3_FIRST_LINE_INDENT=-64.8

# ----------------------------------------------------------------------------
# 四级标题样式配置
# ----------------------------------------------------------------------------
TITLE4_FONT=黑体
TITLE4_FONT_SIZE=12
TITLE4_LINE_SPACING=21
TITLE4_BOLD=true
TITLE4_LEFT_INDENT=97.2
TITLE4_FIRST_LINE_INDENT=-97.2

# ----------------------------------------------------------------------------
# 五级标题样式配置
# ----------------------------------------------------------------------------
TITLE5_FONT=黑体
TITLE5_FONT_SIZE=12
TITLE5_LINE_SPACING=21
TITLE5_BOLD=true

# ----------------------------------------------------------------------------
# 六级标题样式配置
# ----------------------------------------------------------------------------
TITLE6_FONT=黑体
TITLE6_FONT_SIZE=12
TITLE6_LINE_SPACING=21
TITLE6_BOLD=true

# ----------------------------------------------------------------------------
# 表格样式配置（三线表）
# ----------------------------------------------------------------------------
TABLE_HEADER_FONT=黑体
TABLE_HEADER_FONT_SIZE=12
TABLE_HEADER_BOLD=true
TABLE_BODY_FONT=宋体
TABLE_BODY_FONT_SIZE=12
TABLE_BODY_BOLD=false
TABLE_BORDER_TOP_BOTTOM=1.5
TABLE_BORDER_HEADER=0.75

# ----------------------------------------------------------------------------
# 目录样式配置（样式名：toc 1, toc 2等）
# ----------------------------------------------------------------------------
TOC_TITLE_FONT=黑体
TOC_TITLE_FONT_SIZE=12
TOC_TITLE_BOLD=true
TOC_LEVEL1_FONT=黑体
TOC_LEVEL1_FONT_SIZE=12
TOC_LEVEL2_FONT=宋体
TOC_LEVEL2_FONT_SIZE=12
TOC_LEVEL3_FONT=宋体
TOC_LEVEL3_FONT_SIZE=12
TOC_LINE_SPACING=21

# ----------------------------------------------------------------------------
# 页眉页脚样式配置
# ----------------------------------------------------------------------------
HEADER_FONT=宋体
HEADER_FONT_SIZE=9
FOOTER_FONT=宋体
FOOTER_FONT_SIZE=9

# ----------------------------------------------------------------------------
# 页面设置
# ----------------------------------------------------------------------------
PAGE_MARGIN_TOP=2.5
PAGE_MARGIN_BOTTOM=2.5
PAGE_MARGIN_LEFT=3.0
PAGE_MARGIN_RIGHT=2.5
HEADER_MARGIN=1.5
FOOTER_MARGIN=1.75

# ----------------------------------------------------------------------------
# 文本转换配置（将来时态）
# ----------------------------------------------------------------------------
ENABLE_FUTURE_TENSE=true
TENSE_REPLACEMENTS=已完成=将完成,已实现=将实现,正在进行=将进行,已经=将要,正在=将要,实现了=将实现,完成了=将完成,开发了=将开发,设计了=将设计,测试了=将测试,部署了=将部署

# ----------------------------------------------------------------------------
# 标题识别规则配置
# ----------------------------------------------------------------------------
HEADING1_PATTERN=^\d+[\s\u3000]+[^\)\d]
HEADING2_PATTERN=^\d+\.\d+[\s\u3000]+[^\)\d]
HEADING3_PATTERN=^\d+\.\d+\.\d+[\s\u3000]+[^\)\d]
HEADING4_PATTERN=^\d+\.\d+\.\d+\.\d+[\s\u3000]+[^\)\d]
HEADING5_PATTERN=^\d+\.\d+\.\d+\.\d+\.\d+[\s\u3000]+[^\)\d]
HEADING6_PATTERN=^\d+\.\d+\.\d+\.\d+\.\d+\.\d+[\s\u3000]+[^\)\d]

# ----------------------------------------------------------------------------
# 特殊页面样式配置（首页、封面等）
# 这些样式的段落不会被修改，保持原有格式
# ----------------------------------------------------------------------------
SKIP_SPECIAL_PAGES=true
SPECIAL_PAGE_STYLES=封面_文档封格式版本,封面_项目文档统一标识,封面_文件名,封面_文件标识,封面_单位签名,修改记录页_正文,目录_正文,toc 1,toc 2,toc 3,toc 4,toc 5,toc 6

# ----------------------------------------------------------------------------
# 输出配置
# ----------------------------------------------------------------------------
VERBOSE=true
KEEP_BACKUP=true

# ============================================================================
# 配置文件结束
# ============================================================================