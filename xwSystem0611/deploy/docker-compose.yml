version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: xianwei-mysql
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=Asia/Shanghai
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks:
      - xianwei-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: xianwei-minio
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ./minio/data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - xianwei-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/minio/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3

  algorithm:
    image: xianwei-algorithm:offline
    container_name: xianwei-algorithm
    ports:
      - "${ALGORITHM_PORT}:5001"
    volumes:
      - ./算法:/app
      - algorithm-logs:/app/算法服务/logs
    working_dir: /app/算法服务
    command: python app.py
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_PORT=5001
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
    restart: unless-stopped
    networks:
      - xianwei-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: nginx:latest
    container_name: xianwei-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./前端/dist:/usr/share/nginx/html:ro
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - BACKEND_PORT=${BACKEND_PORT}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - xianwei-network
    depends_on:
      - algorithm

networks:
  xianwei-network:
    driver: bridge

volumes:
  algorithm-logs:
