spring:
  application:
    name: uygur-project
  # HTTP 编码配置
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
  datasource:
    # Druid 连接池配置
    url: jdbc:mysql://36.141.21.176:9204/uygur_project?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: jixianyuan1314
    driver-class-name: com.mysql.cj.jdbc.Driver  # MySQL 8 使用 cj 驱动类
    type: com.alibaba.druid.pool.DruidDataSource  # 明确指定 Druid 数据源类型
    druid:
      # 连接池基础配置
      initial-size: 5          # 初始化连接数
      min-idle: 5              # 最小空闲连接数
      max-active: 20           # 最大活跃连接数
      max-wait: 60000          # 获取连接超时时间（毫秒）
      time-between-eviction-runs-millis: 60000  # 检测空闲连接间隔
      min-evictable-idle-time-millis: 300000    # 连接最小空闲时间（毫秒）
      validation-query: SELECT 1 FROM DUAL      # 连接有效性检测SQL
      test-while-idle: true                     # 空闲时检测连接有效性
      test-on-borrow: false                     # 借出连接时不检测（提升性能）
      test-on-return: false                     # 归还连接时不检测
      pool-prepared-statements: true            # 开启PSCache
      max-pool-prepared-statement-per-connection-size: 20
      # 监控配置（可选）
      filters: stat,wall,log4j2  # 启用监控统计、防火墙、日志
      stat-view-servlet:
        enabled: true            # 开启监控页面
        url-pattern: /druid/*    # 监控页面访问路径
        login-username: admin    # 监控页面登录账号
        login-password: admin    # 监控页面登录密码
      web-stat-filter:
        enabled: true            # 开启Web请求统计
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB      # 单个文件最大100MB（支持图片上传）
      max-request-size: 100MB   # 整个请求最大100MB



server:
  port: 8081

# Actuator 健康检查配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# 日志配置
logging:
  level:
    root: info
    com.qy.dch: debug  # 项目包日志级别
  file:
    name: logs/application.log  # 日志文件路径
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

mybatis:
  type-aliases-package: com.qy.dch.dto
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    # 可选：开启MyBatis SQL日志（需取消注释）
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# MyBatis-Plus 配置（需取消注释）
# mybatis-plus:
#   configuration:
#     log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

filePath: C:\\Users\\75965\\Desktop\\all_text_time.json

# 算法服务配置
algorithm:
  service:
    url: http://localhost:5001

# MinIO 对象存储配置
minio:
  endpoint: http://36.141.21.176:8522
  access-key: xianwei-admin
  secret-key: xianwei2024
  bucket: xianwei-images

# RAG 知识库配置
rag:
  elasticsearch:
    host: ${ES_HOST:localhost}
    port: ${ES_PORT:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}
    index-name: xianwei_docs
  embedding:
    base-url: ${EMBEDDING_BASE_URL:http://localhost:5002}
    model: bge-large-zh-v1.5
    dimension: 1024
    batch-size: 32
    retry-count: 3
    retry-delay-ms: 5000
    timeout-seconds: 60
  chunk:
    short-threshold: 128
    medium-threshold: 512
    medium-size: 256
    long-size: 512
    overlap: 64
  indexing:
    max-duration-minutes: 30
    es-batch-size: 100
  search:
    bm25-weight: 0.3
    vector-weight: 0.7
    rrf-k: 60
    default-top-k: 10
  ocr:
    enabled: true
    thread-pool-size: 4
    tesseract:
      datapath: /usr/share/tesseract-ocr/4.00/tessdata
      language: chi_sim+eng
      page-seg-mode: 1
      ocr-engine-mode: 1
    image:
      enable-ocr: true
      max-size-mb: 10
  parser:
    max-file-size-mb: 50
    temp-dir: /tmp/xianwei-uploads
    strict-docx-only: true
