spring:
  application:
    name: rag-knowledge-base

  # PostgreSQL 数据源配置
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:192.168.57.10}:${POSTGRES_PORT:5432}/${POSTGRES_DB:rag_knowledge}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# PostgreSQL + pgvector 配置
postgres:
  host: ${POSTGRES_HOST:192.168.57.10}
  port: ${POSTGRES_PORT:5432}
  database: ${POSTGRES_DB:rag_knowledge}
  username: ${POSTGRES_USER:admin}
  password: ${POSTGRES_PASSWORD:your_password_here}
  vector:
    dimension: 1024
    index-type: ivfflat
    lists: 100

# Embedding服务配置
embedding:
  service:
    url: ${EMBEDDING_URL:http://192.168.57.10:8000}
    timeout: 30s
    batch-size: 100
    retry:
      max-attempts: 3
      backoff-ms: 1000
  model:
    name: bge-large-zh-v1.5
    dimension: 1024

# OCR配置
ocr:
  tesseract:
    datapath: /usr/share/tessdata
    language: chi_sim
    page-seg-mode: 1
    ocr-engine-mode: 1
  thread-pool-size: 4

# 文档解析配置
document:
  parser:
    chunk-strategy:
      short-text-max-length: 256
      medium-chunk-length: 512
      medium-chunk-max-length: 768
      long-chunk-length: 1024
      long-chunk-overlap: 128
    table:
      format: markdown
    image:
      enable-ocr: true
      max-size-mb: 10

# 检索配置
retrieval:
  hybrid-search:
    bm25-weight: 0.3
    vector-weight: 0.7
    top-k: 10
    rrf-k: 60
  vector-search:
    num-candidates: 100
  filters:
    enabled: true
  rerank:
    enabled: false
    top-k: 5

# 日志配置
logging:
  level:
    root: INFO
    com.intel.rag: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true