version: '3.8'

services:
  mysql:
    image: mysql:8.0.35
    container_name: xianwei-mysql
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=Asia/Shanghai
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks:
      - xianwei-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: xianwei-minio
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - ./minio/data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - xianwei-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  algorithm:
    image: xianwei-algorithm:offline
    container_name: xianwei-algorithm
    ports:
      - "${ALGORITHM_PORT}:5001"
    volumes:
      - ./算法:/app
      - algorithm-logs:/app/算法服务/logs
    working_dir: /app/算法服务
    command: python app.py
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_PORT=5001
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
    restart: unless-stopped
    networks:
      - xianwei-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  elasticsearch:
    image: elasticsearch:7.17.15
    container_name: xianwei-elasticsearch
    ports:
      - "${ES_PORT}:9200"
    volumes:
      - ./es/data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    networks:
      - xianwei-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  embedding:
    image: xianwei-embedding:offline
    container_name: xianwei-embedding
    ports:
      - "${EMBEDDING_PORT}:5002"
    volumes:
      - ./models/bge-large-zh-v1.5:/app/models/bge-large-zh-v1.5:ro
      - embedding-logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - BGE_MODEL_PATH=/app/models/bge-large-zh-v1.5
      - OMP_NUM_THREADS=${EMBEDDING_THREADS:-4}
      - MKL_NUM_THREADS=${EMBEDDING_THREADS:-4}
    restart: unless-stopped
    networks:
      - xianwei-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  frontend:
    image: nginx:1.25-alpine
    container_name: xianwei-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./前端/dist:/usr/share/nginx/html:ro
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    environment:
      - BACKEND_PORT=${BACKEND_PORT}
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - xianwei-network
    depends_on:
      - algorithm

networks:
  xianwei-network:
    driver: bridge

volumes:
  algorithm-logs:
  embedding-logs:
